---
# yaml-language-server: $schema=https://raw.githubusercontent.com/helm-unittest/helm-unittest/main/schema/helm-testsuite.json
suite: test secrets
templates:
  - secrets/jwtkey.yaml
  - secrets/slurmkey.yaml
release:
  name: test-release
  namespace: test-namespace
tests:
  - it: should not mutate created jwt secret
    template: secrets/jwtkey.yaml
    kubernetesProvider:
      scheme:
        "v1/Secret":
          gvr:
            version: "v1"
            resource: "secrets"
          namespaced: true
      objects:
        - kind: Secret
          apiVersion: v1
          metadata:
            name: test-release-slurm-auth-jwt
            namespace: test-namespace
          data:
            jwt.key: dGVzdAo=
          immutable: true
    set:
      jwtKey:
        create: true
    asserts:
      - equal:
          path: data["jwt.key"]
          value: dGVzdAo=
  - it: should not create a jwt  secret if controller and accounting are external
    template: secrets/jwtkey.yaml
    set:
      controller:
        external: true
      accounting:
        external: true
      jwtKey:
        create: true
    asserts:
      - hasDocuments:
          count: 0
  - it: should not create a jwt  secret if create is set to false
    template: secrets/jwtkey.yaml
    set:
      jwtKey:
        create: false
    asserts:
      - hasDocuments:
          count: 0
  - it: should create a jwt  secret with a custom name and key if create is set to true and a name and key are specified
    template: secrets/jwtkey.yaml
    set:
      jwtKey:
        create: true
        secretRef:
          name: custom-jwt-secret-name
          key: custom_jwtjs256_key
    asserts:
      - equal:
          path: metadata.name
          value: custom-jwt-secret-name
      - exists:
          path: data.custom_jwtjs256_key
  - it: should set secret annotations on created jwt  secret when set
    template: secrets/jwtkey.yaml
    set:
      jwtKey:
        create: true
        annotations:
          secrets.slinky.slurm.net/annotation: "present"
    asserts:
      - equal:
          path: metadata.annotations
          value: {secrets.slinky.slurm.net/annotation: "present"}
  - it: should not mutate created slurm secret
    template: secrets/slurmkey.yaml
    kubernetesProvider:
      scheme:
        "v1/Secret":
          gvr:
            version: "v1"
            resource: "secrets"
          namespaced: true
      objects:
        - kind: Secret
          apiVersion: v1
          metadata:
            name: test-release-slurm-auth-slurm
            namespace: test-namespace
          data:
            slurm.key: dGVzdAo=
          immutable: true
    set:
      slurmKey:
        create: true
    asserts:
      - equal:
          path: data["slurm.key"]
          value: dGVzdAo=
  - it: should not create a slurm secret if controller and accounting are external
    template: secrets/slurmkey.yaml
    set:
      controller:
        external: true
      accounting:
        external: true
      slurmKey:
        create: true
    asserts:
      - hasDocuments:
          count: 0
  - it: should not create a slurm secret if create is set to false
    template: secrets/slurmkey.yaml
    set:
      slurmKey:
        create: false
    asserts:
      - hasDocuments:
          count: 0
  - it: should create a slurm secret with a custom name and key if create is set to true and a name and key are specified
    template: secrets/slurmkey.yaml
    set:
      slurmKey:
        create: true
        secretRef:
          name: custom-slurm-secret-name
          key: custom_slurm_key
    asserts:
      - equal:
          path: metadata.name
          value: custom-slurm-secret-name
      - exists:
          path: data.custom_slurm_key
  - it: should set secret annotations on created slurm secret when set
    template: secrets/slurmkey.yaml
    set:
      slurmKey:
        create: true
        annotations:
          secrets.slinky.slurm.net/annotation: "present"
    asserts:
      - equal:
          path: metadata.annotations
          value: {secrets.slinky.slurm.net/annotation: "present"}
